<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SET 3 — Important MCQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="set.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <span class="logo">{JS}</span>
    <span class="nav-title">SET 3 — Important MCQ</span>
    <a href="../mcq_content.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </a>
  </div>
</nav>

<!-- QUIZ CONTAINER -->
<div class="quiz-wrapper">
  <div class="quiz-container">

    <!-- PROGRESS BAR -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-text">Question <span id="currentQ">1</span> of <span id="totalQ">40</span></span>
        <span class="progress-percent" id="progressPercent">2%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- QUESTION CARD -->
    <div class="question-card">
      <div class="question-badge" id="setBadge">SET 3</div>
      <h2 class="question-text" id="questionText">Loading...</h2>

      <!-- OPTIONS -->
      <div class="options-grid" id="optionsGrid">
        <!-- Options will be injected here -->
      </div>

      <!-- RESULT MESSAGE -->
      <div class="result-message" id="resultMessage"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-buttons">
      <button class="btn btn-secondary" id="prevBtn" disabled>← Previous</button>
      <button class="btn btn-primary" id="nextBtn">Check Answer →</button>
    </div>

    <!-- QUIZ COMPLETE -->
    <div class="quiz-complete hidden" id="quizComplete">
      <div class="complete-card">
        <div class="complete-icon">✓</div>
        <h2>Quiz Complete!</h2>
        <div class="score-display">
          <div class="score-value" id="finalScore">0</div>
          <div class="score-label">out of 40</div>
        </div>
        <p class="score-percent" id="scorePercent">0%</p>
        <div class="score-breakdown">
          <div class="breakdown-item">
            <span class="breakdown-label">Correct</span>
            <span class="breakdown-value correct" id="correctCount">0</span>
          </div>
          <div class="breakdown-item">
            <span class="breakdown-label">Incorrect</span>
            <span class="breakdown-value incorrect" id="incorrectCount">0</span>
          </div>
          <div class="breakdown-item">
            <span class="breakdown-label">Skipped</span>
            <span class="breakdown-value skipped" id="skippedCount">0</span>
          </div>
        </div>
        <a href="../mcq_content.html">
          <button class="btn btn-primary btn-large">Back to MCQ Hub</button>
        </a>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="page-footer">
  <div class="footer-inner">
    <span class="logo">{JS}</span>
    <span>JavaScript Mastery — MCQ Quiz</span>
    <a href="../mcq_content.html" class="footer-link">← Back to MCQ Hub</a>
  </div>
</footer>

<script src="set3.js"></script>
</body>
</html>
